input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/drivers/mssql-jdbc-13.4.0.jre11.jar"
    jdbc_driver_class => "com.microsoft.sqlserver.jdbc.SQLServerDriver"
    jdbc_connection_string => "jdbc:sqlserver://host.docker.internal:1434;databaseName=parcels_db_test;encrypt=false;trustServerCertificate=true"
    jdbc_user => "parcels_db_user"
    jdbc_password => "password!"
    schedule => "*/5 * * * *"
    statement => "
      SELECT
        s.shipment_id,
        s.shipment_tracking_number,
        s.created_at,
        s.issued_at,
        s.shipment_total_price,
        s.shipment_price_for_delivery,
        s.shipment_price_for_weight,
        s.shipment_price_for_distance,
        s.shipment_insurance_fee,
        ss.shipment_status_name AS status_name,
        st.shipment_type_name AS type_name,
        origin_city.city_name AS origin_city,
        dest_city.city_name AS destination_city,
        CONCAT(sender.client_last_name, ' ', sender.client_first_name, ' ', sender.middle_name) AS sender_name,
        CONCAT(recipient.client_last_name, ' ', recipient.client_first_name, ' ', recipient.middle_name) AS recipient_name
      FROM shipments s
      JOIN shipment_statuses ss ON s.shipment_status_id = ss.shipment_status_id
      JOIN shipment_types st ON s.shipment_type_id = st.shipment_type_id
      LEFT JOIN clients sender ON s.sender_id = sender.client_id
      LEFT JOIN clients recipient ON s.recipient_id = recipient.client_id
      LEFT JOIN shipment_origin_delivery_points sodp ON s.shipment_id = sodp.shipment_id
      LEFT JOIN delivery_points origin_dp ON sodp.delivery_point_id = origin_dp.delivery_point_id
      LEFT JOIN cities origin_city ON origin_dp.city_id = origin_city.city_id
      LEFT JOIN shipment_destination_delivery_points sddp ON s.shipment_id = sddp.shipment_id
      LEFT JOIN delivery_points dest_dp ON sddp.delivery_point_id = dest_dp.delivery_point_id
      LEFT JOIN cities dest_city ON dest_dp.city_id = dest_city.city_id
      WHERE s.shipment_id > :sql_last_value
      ORDER BY s.shipment_id
    "
    tracking_column => "shipment_id"
    tracking_column_type => "numeric"
    use_column_value => true
    last_run_metadata_path => "/usr/share/logstash/.last_run_shipments"
  }
}

filter {
  mutate {
    remove_field => ["@version"]
  }
  date {
    match => ["created_at", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "shipments"
    document_id => "%{shipment_id}"
  }
}