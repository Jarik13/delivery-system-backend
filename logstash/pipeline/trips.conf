input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/drivers/mssql-jdbc-13.4.0.jre11.jar"
    jdbc_driver_class => "com.microsoft.sqlserver.jdbc.SQLServerDriver"
    jdbc_connection_string => "jdbc:sqlserver://host.docker.internal:1434;databaseName=parcels_db_test;encrypt=false;trustServerCertificate=true"
    jdbc_user => "parcels_db_user"
    jdbc_password => "password!"
    schedule => "*/5 * * * *"
    statement => "
      SELECT
        t.trip_id,
        t.trip_number,
        t.trip_scheduled_departure_time  AS scheduled_departure,
        t.trip_scheduled_arrival_time    AS scheduled_arrival,
        t.trip_actual_departure_time     AS actual_departure,
        t.trip_actual_arrival_time       AS actual_arrival,
        ts.trip_status_name              AS status_name,
        CONCAT(d.driver_last_name, ' ', d.driver_first_name, ' ', d.driver_middle_name) AS driver_name,
        d.driver_id,
        v.vehicle_license_plate,
        v.vehicle_id,
        fl.fleet_load_capacity,
        fl.fleet_cargo_volume,
        fb.fleet_brand_name              AS vehicle_brand,
        fbt.fleet_body_type_name         AS vehicle_body_type,
        origin_city.city_name            AS origin_city,
        dest_city.city_name              AS destination_city,
        origin_reg.region_name           AS origin_region,
        dest_reg.region_name             AS destination_region,
        COUNT(DISTINCT sw.shipment_id)   AS shipments_count,
        SUM(p.parcel_actual_weight)      AS total_cargo_weight,
        STRING_AGG(CAST(r.route_id AS VARCHAR), ',') AS route_ids
      FROM trips t
      JOIN trip_statuses ts               ON t.trip_status_id             = ts.trip_status_id
      LEFT JOIN drivers d                 ON t.driver_id                  = d.driver_id
      LEFT JOIN vehicles v                ON t.vehicle_id                 = v.vehicle_id
      LEFT JOIN fleets fl                 ON v.fleet_id                   = fl.fleet_id
      LEFT JOIN fleet_brands fb           ON fl.fleet_brand_id            = fb.fleet_brand_id
      LEFT JOIN fleet_body_types fbt      ON fl.fleet_body_type_id        = fbt.fleet_body_type_id
      LEFT JOIN waybill_routes wr         ON t.trip_id                    = wr.trip_id
      LEFT JOIN routes r                  ON wr.route_id                  = r.route_id
      LEFT JOIN branches origin_b         ON r.origin_branch_id           = origin_b.branch_id
      LEFT JOIN delivery_points origin_dp ON origin_b.delivery_point_id   = origin_dp.delivery_point_id
      LEFT JOIN cities origin_city        ON origin_dp.city_id            = origin_city.city_id
      LEFT JOIN districts origin_dist     ON origin_city.district_id      = origin_dist.district_id
      LEFT JOIN regions origin_reg        ON origin_dist.region_id        = origin_reg.region_id
      LEFT JOIN branches dest_b           ON r.destination_branch_id      = dest_b.branch_id
      LEFT JOIN delivery_points dest_dp   ON dest_b.delivery_point_id     = dest_dp.delivery_point_id
      LEFT JOIN cities dest_city          ON dest_dp.city_id              = dest_city.city_id
      LEFT JOIN districts dest_dist       ON dest_city.district_id        = dest_dist.district_id
      LEFT JOIN regions dest_reg          ON dest_dist.region_id          = dest_reg.region_id
      LEFT JOIN waybills w                ON wr.waybill_id                = w.waybill_id
      LEFT JOIN shipment_waybills sw      ON w.waybill_id                 = sw.waybill_id
      LEFT JOIN shipments s               ON sw.shipment_id               = s.shipment_id
      LEFT JOIN parcels p                 ON s.parcel_id                  = p.parcel_id
      WHERE t.trip_id > :sql_last_value
      GROUP BY
        t.trip_id, t.trip_number,
        t.trip_scheduled_departure_time, t.trip_scheduled_arrival_time,
        t.trip_actual_departure_time, t.trip_actual_arrival_time,
        ts.trip_status_name,
        d.driver_last_name, d.driver_first_name, d.driver_middle_name, d.driver_id,
        v.vehicle_license_plate, v.vehicle_id,
        fl.fleet_load_capacity, fl.fleet_cargo_volume,
        fb.fleet_brand_name, fbt.fleet_body_type_name,
        origin_city.city_name, dest_city.city_name,
        origin_reg.region_name, dest_reg.region_name
      ORDER BY t.trip_id
    "
    tracking_column => "trip_id"
    tracking_column_type => "numeric"
    use_column_value => true
    last_run_metadata_path => "/usr/share/logstash/.last_run_trips"
  }
}

filter {
  mutate {
    remove_field => ["@version"]
    convert => {
      "fleet_load_capacity" => "float"
      "fleet_cargo_volume"  => "float"
      "shipments_count"     => "integer"
      "total_cargo_weight"  => "float"
    }
  }
  date {
    match => ["scheduled_departure", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd"]
    target => "@timestamp"
    timezone => "UTC"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "trips"
    document_id => "%{trip_id}"
  }
}