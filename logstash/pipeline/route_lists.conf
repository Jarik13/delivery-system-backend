input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/drivers/mssql-jdbc-13.4.0.jre11.jar"
    jdbc_driver_class => "com.microsoft.sqlserver.jdbc.SQLServerDriver"
    jdbc_connection_string => "jdbc:sqlserver://host.docker.internal:1434;databaseName=parcels_db_test;encrypt=false;trustServerCertificate=true"
    jdbc_user => "parcels_db_user"
    jdbc_password => "password!"
    schedule => "*/5 * * * *"
    statement => "
      SELECT
        rl.route_list_id,
        rl.route_list_number,
        rl.route_list_total_weight,
        rl.created_at,
        rl.planned_departure_time,
        rls.route_list_status_name AS status_name,
        CONCAT(c.courier_last_name, ' ', c.courier_first_name, ' ', c.courier_middle_name) AS courier_name,
        COUNT(rsi.route_sheet_item_id) AS total_shipments,
        SUM(CASE WHEN rsi.is_delivered = 1 THEN 1 ELSE 0 END) AS delivered_count
      FROM route_lists rl
      JOIN route_list_statuses rls ON rl.route_list_status_id = rls.route_list_status_id
      JOIN couriers c ON rl.courier_id = c.courier_id
      LEFT JOIN route_sheet_items rsi ON rl.route_list_id = rsi.route_list_id
      WHERE rl.route_list_id > :sql_last_value
      GROUP BY
        rl.route_list_id,
        rl.route_list_number,
        rl.route_list_total_weight,
        rl.created_at,
        rl.planned_departure_time,
        rls.route_list_status_name,
        c.courier_last_name,
        c.courier_first_name,
        c.courier_middle_name
      ORDER BY rl.route_list_id
    "
    tracking_column => "route_list_id"
    tracking_column_type => "numeric"
    use_column_value => true
    last_run_metadata_path => "/usr/share/logstash/.last_run_route_lists"
  }
}

filter {
  mutate {
    remove_field => ["@version"]
  }
  date {
    match => ["created_at", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "route_lists"
    document_id => "%{route_list_id}"
  }
}