version: '3.8'
services:
  redis:
    image: redis:latest
    container_name: delivery-system-redis
    ports:
      - "6379:6379"
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: delivery-system-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    restart: always